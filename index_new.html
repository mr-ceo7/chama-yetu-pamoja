<!DOCTYPE html>
<html><head>
<title>ChamaYetuPamoja - Deploy Console</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--panel:#0d0d0d;--green:#4ade80;--red:#f87171;--text:#e5e5e5;--border:#222}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.5;min-height:100vh}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.hdr h1 span{font-weight:400;opacity:0.6;font-size:14px;margin-left:8px}
.repo{color:var(--text);opacity:0.4;font-family:'JetBrains Mono',monospace;font-size:12px}
.tabs{display:flex;gap:12px;padding:0 24px;margin-top:-1px;background:var(--panel);border-bottom:1px solid var(--border)}
.tab{padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;color:#888;border-bottom:2px solid transparent;transition:0.2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.wrap{max-width:1100px;margin:24px auto;padding:0 24px}
.panel{display:none}
.panel.active{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.st{background:var(--panel);border:1px solid var(--border);padding:20px;border-radius:12px;text-align:center}
.st .v{font-size:28px;font-weight:800;margin-bottom:4px}
.st .l{font-size:12px;text-transform:uppercase;color:#888;letter-spacing:1px;font-weight:600}
.btn{background:var(--green);color:#000;border:none;padding:10px 18px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:0.2s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{filter:brightness(1.1);transform:scale(1.02)}
.btn.gray{background:#222;color:#fff}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:0.2s}
.card:hover{border-color:#333}
.card-main{padding:16px;display:flex;align-items:center;gap:16px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.ready{background:var(--green);box-shadow:0 0 10px rgba(74,222,128,0.3)}
.dot.error{background:var(--red);box-shadow:0 0 10px rgba(248,113,113,0.3)}
.dot.building{background:#fbbf24;animation:pulse 1s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
.info{flex:1;cursor:pointer}
.msg{font-weight:600;font-size:15px;margin-bottom:4px}
.meta{font-size:12px;color:#888;display:flex;gap:12px;align-items:center}
.meta code{color:#a78bfa;font-family:'JetBrains Mono',monospace}
.bdg{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:800}
.bdg.fe{background:#3b82f6;color:#fff}
.bdg.be{background:#10b981;color:#fff}
.bdg.rb{background:#f59e0b;color:#fff}
.dur{font-size:12px;color:#888}
.log-p{height:0;overflow:hidden;transition:height 0.3s ease-out;background:#000}
.log-p.open{height:400px;overflow-y:auto;border-top:1px solid #222}
.log-p pre{padding:20px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#bbb;white-space:pre-wrap}
.env-tbl{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.env-tbl th{text-align:left;background:#161616;padding:12px;font-size:12px;text-transform:uppercase;color:#888;letter-spacing:1px}
.env-tbl td{padding:6px 12px;border-bottom:1px solid #1a1a1a;font-size:13px}
.env-tbl td:first-child{font-family:'JetBrains Mono',monospace;color:#a78bfa;font-size:12px;width:35%}
.env-tbl input{background:#0a0a0a;border:1px solid #333;color:#e5e5e5;padding:6px 10px;border-radius:6px;width:100%;font-family:'JetBrains Mono',monospace;font-size:12px}
.env-tbl input:focus{outline:none;border-color:var(--green)}
.env-tbl .del-btn{color:var(--red);cursor:pointer;font-size:16px;padding:4px 8px;border:none;background:none}
.env-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.status-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px}
.status-card h3{font-size:13px;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.status-card .val{font-size:15px;font-weight:600;color:var(--text)}
.status-card .val.ok{color:var(--green)}
.status-card .val.bad{color:var(--red)}
.status-card pre{font-family:'JetBrains Mono',monospace;font-size:11px;color:#888;margin-top:6px}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1}

/* Logs Panel Styles */
.terminal{background:#000;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:12px}
.term-hdr{background:#111;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.term-body{height:60vh;overflow-y:auto;padding:16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#4ade80}
.log-line{margin-bottom:2px;display:flex;gap:12px}
.log-line .ts{color:#555;flex-shrink:0}
.log-line.error{color:var(--red)}
.log-line.error .ts{color:var(--red);opacity:0.6}
.term-controls{display:flex;gap:8px;align-items:center}
select{background:#000;color:var(--text);border:1px solid #333;padding:6px 12px;border-radius:6px;font-size:13px;outline:none}
</style>
</head><body>
<div class="hdr">
<h1>ChamaYetuPamoja <span>Deploy Console</span></h1>
<div class="repo">mr-ceo7/ChamaYetuPamoja</div>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('deploys')">Deployments</div>
<div class="tab" onclick="switchTab('logs')">Live Logs</div>
<div class="tab" onclick="switchTab('env')">Environment</div>
<div class="tab" onclick="switchTab('status')">Status</div>
</div>
<div class="wrap">
    <!-- Panel: Deployments -->
    <div class="panel active" id="p-deploys">
        <div class="stats" id="stats"></div>
        <div style="margin-bottom:12px"><button class="btn" onclick="redeploy()">Redeploy Latest</button></div>
        <div id="deploys"></div>
    </div>

    <!-- Panel: Live Logs -->
    <div class="panel" id="p-logs">
        <div class="env-bar">
            <h2 style="font-size:16px;color:#e5e5e5">Production API Logs</h2>
            <div class="term-controls">
                <select id="log-since" onchange="handleLogChange()">
                    <option value="live">Live Trail (Real-time)</option>
                    <option value="5m">Last 5 Minutes</option>
                    <option value="1h" selected>Last 1 Hour</option>
                    <option value="12h">Last 12 Hours</option>
                    <option value="24h">Last 24 Hours</option>
                    <option value="7d">Last 7 Days</option>
                </select>
                <button class="btn gray" onclick="copyLogs()">Copy</button>
                <button class="btn gray" onclick="downloadLogs()">Download</button>
                <button class="btn" onclick="handleLogChange()">Refresh</button>
            </div>
        </div>
        <div class="terminal">
            <div id="log-container" class="term-body">Loading logs...</div>
        </div>
    </div>

    <!-- Panel: Environment -->
    <div class="panel" id="p-env">
        <div class="env-bar"><h2 style="font-size:16px;color:#e5e5e5">Backend Environment</h2>
        <button class="btn" onclick="saveEnv()">Save & Restart API</button></div>
        <table class="env-tbl"><thead><tr><th>Key</th><th>Value</th><th></th></tr></thead>
        <tbody id="env-body"></tbody></table>
        <div class="add-row">
            <input id="new-key" placeholder="NEW_KEY" style="background:#0a0a0a;border:1px solid #333;color:#e5e5e5;padding:6px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px">
            <input id="new-val" placeholder="value" style="background:#0a0a0a;border:1px solid #333;color:#e5e5e5;padding:6px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px">
            <button class="btn" onclick="addEnvRow()">+ Add</button>
        </div>
    </div>

    <!-- Panel: Status -->
    <div class="panel" id="p-status"><div class="status-grid" id="status-grid"></div></div>
</div>

<script>
const API='/webhook/api';
let dData=[],envData={};

function switchTab(t){
    document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active', e.textContent.toLowerCase().includes(t.substring(0,3))));
    document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active'));
    const p = document.getElementById('p-'+t);
    p.classList.add('active');
    if(t==='env')loadEnv();
    if(t==='status')loadStatus();
    if(t==='logs')loadLiveLogs();
}

async function loadDeploys(){
    try{const r=await fetch(API+'/deployments');dData=await r.json();renderStats();renderDeploys();}catch(e){console.error(e)}
}
function renderStats(){
    const t=dData.length,ok=dData.filter(d=>d.status==='ready').length,er=dData.filter(d=>d.status==='error').length;
    const avg=dData.filter(d=>d.duration_s).reduce((a,d)=>a+d.duration_s,0)/(ok||1);
    document.getElementById('stats').innerHTML=`
    <div class="st"><div class="v">${t}</div><div class="l">Total</div></div>
    <div class="st"><div class="v" style="color:#4ade80">${ok}</div><div class="l">Success</div></div>
    <div class="st"><div class="v" style="color:#f87171">${er}</div><div class="l">Failed</div></div>
    <div class="st"><div class="v" style="color:#fbbf24">${Math.round(avg)}s</div><div class="l">Avg Time</div></div>`;
}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d+'Z').getTime())/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

function renderDeploys(){
    const el=document.getElementById('deploys');
    if(!dData.length){el.innerHTML='<div class="empty"><h2>No deployments yet</h2></div>';return;}
    el.innerHTML=dData.map(d=>{
        const bg=[];
        if(d.changes?.frontend)bg.push('<span class="bdg fe">FE</span>');
        if(d.changes?.backend)bg.push('<span class="bdg be">BE</span>');
        if(d.branch==='rollback')bg.push('<span class="bdg rb">Rollback</span>');
        return`<div class="card">
        <div class="card-main">
        <div class="dot ${d.status}"></div>
        <div class="info" onclick="toggleLog('${d.id}')">
        <div class="msg">${d.commit_msg||'Deploying...'}</div>
        <div class="meta"><code>${d.commit_short}</code><span>${d.branch||'main'}</span><span>${d.author||''}</span>${bg.join('')}</div>
        </div>
        <div class="tm"><div>${d.started_at?timeAgo(d.started_at):''}</div>${d.duration_s?'<div class="dur">'+d.duration_s+'s</div>':d.status==='building'?'<div class="dur" style="color:#fbbf24">Building...</div>':''}</div>
        <div class="actions"><button class="btn gray" onclick="rollback('${d.commit_sha}')">Rollback</button></div>
        </div>
        <div class="log-p" id="log-${d.id}"><pre>Loading...</pre></div>
        </div>`;}).join('');
}

async function toggleLog(id){
    const p=document.getElementById('log-'+id);
    if(p.classList.contains('open')){p.classList.remove('open');return;}
    p.classList.add('open');
    try{const r=await fetch(API+'/logs/'+id);p.querySelector('pre').textContent=r.ok?await r.text():'No logs';}catch(e){p.querySelector('pre').textContent='Error';}
}

let liveInterval = null;

function handleLogChange() {
    const since = document.getElementById('log-since').value;
    if (since === 'live') {
        if (!liveInterval) {
            loadLiveLogs();
            liveInterval = setInterval(loadLiveLogs, 3000);
        }
    } else {
        if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
        loadLiveLogs();
    }
}

async function loadLiveLogs(){
    const since = document.getElementById('log-since').value;
    const cont = document.getElementById('log-container');
    try {
        const r = await fetch(API+'/live-logs?since='+since);
        const text = await r.text();
        if (!text && since === 'live') return; // Don't wipe if empty on live stream
        
        cont.innerHTML = text.split('\n').filter(Boolean).map(line => {
            const isError = line.toLowerCase().includes('error') || line.toLowerCase().includes('traceback');
            return `<div class="log-line ${isError?'error':''}"><span>${line}</span></div>`;
        }).join('');
        
        // Auto-scroll only if we are at the bottom
        const atBottom = cont.scrollHeight - cont.scrollTop <= cont.clientHeight + 100;
        if (atBottom || since === 'live') cont.scrollTop = cont.scrollHeight;
    } catch(e) { cont.textContent = 'Error loading logs'; }
}

function copyLogs(){
    const text = document.getElementById('log-container').innerText;
    navigator.clipboard.writeText(text);
    alert('Logs copied to clipboard');
}

function downloadLogs(){
    const text = document.getElementById('log-container').innerText;
    const blob = new Blob([text], {type: 'text/plain'});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cyptips_logs_${new Date().toISOString()}.txt`;
    a.click();
}

async function rollback(sha){
    if(!confirm('Rollback to commit '+sha.substring(0,7)+'?'))return;
    await fetch(API+'/rollback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({commit_sha:sha})});
    setTimeout(loadDeploys,2000);
}
async function redeploy(){
    if(!confirm('Re-deploy current HEAD?'))return;
    await fetch(API+'/redeploy',{method:'POST'});
    setTimeout(loadDeploys,2000);
}

async function loadEnv(){
    try{const r=await fetch(API+'/env/backend');envData=await r.json();renderEnv();}catch(e){console.error(e);}
}
function renderEnv(){
    const b=document.getElementById('env-body');
    b.innerHTML=Object.entries(envData).map(([k,v])=>`<tr>
    <td>${k}</td>
    <td><input value="${v.replace(/"/g,'&quot;')}" data-key="${k}"></td>
    <td><button class="del-btn" onclick="delEnv('${k}')">×</button></td>
    </tr>`).join('');
}
function addEnvRow(){
    const k=document.getElementById('new-key').value.trim();
    const v=document.getElementById('new-val').value.trim();
    if(!k)return;
    envData[k]=v;renderEnv();
    document.getElementById('new-key').value='';document.getElementById('new-val').value='';
}
function delEnv(k){delete envData[k];renderEnv();}
async function saveEnv(){
    document.querySelectorAll('#env-body input[data-key]').forEach(i=>{envData[i.dataset.key]=i.value;});
    if(!confirm('Save env and restart API?'))return;
    await fetch(API+'/env/backend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(envData)});
    alert('Saved & API restarted!');
}

async function loadStatus(){
    try{const r=await fetch(API+'/status');const d=await r.json();
    document.getElementById('status-grid').innerHTML=`
    <div class="status-card"><h3>API Service</h3><div class="val ${d.api_service==='active'?'ok':'bad'}">${d.api_service}</div></div>
    <div class="status-card"><h3>Webhook Service</h3><div class="val ${d.webhook_service==='active'?'ok':'bad'}">${d.webhook_service}</div></div>
    <div class="status-card"><h3>Current Deploy</h3><div class="val"><code style="color:#a78bfa">${d.current_commit}</code> on <span style="color:var(--green)">${d.branch}</span></div><div style="margin-top:6px;color:#888;font-size:13px">${d.commit_msg}</div></div>
    <div class="status-card"><h3>Server Uptime</h3><div class="val">${d.uptime}</div></div>
    <div class="status-card" style="grid-column:span 2"><h3>Disk Usage</h3><pre>${d.disk}</pre></div>
    `;}catch(e){console.error(e);}
}

loadDeploys();setInterval(loadDeploys,10000);
</script>
</body></html>
